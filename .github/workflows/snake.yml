# 贡献贪吃蛇动画
name: Snake
on:
  schedule: [{cron: "0 0 * * *"}]  # 每天 UTC 0点自动运行
  workflow_dispatch:               # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # 使用自定义配色确保所有贡献级别都可见
          # color_dots: 从少到多贡献的颜色（5个级别）
          outputs: |
            dist/github-snake.svg?color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-snake-dark.svg?palette=github-dark&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
