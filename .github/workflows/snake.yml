name: Generate-Snake-Animation

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 00:00 自动运行
  workflow_dispatch:      # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 写入权限，用于创建/更新分支
      
    steps:
      # Step 1: 检出代码（只需要获取贡献图数据，不需要提交到当前分支）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: 生成贪吃蛇动画（使用 svg-only 版本，更轻量且渲染更精确）
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&y_scale=5
            dist/github-snake-dark.svg?palette=github-dark&y_scale=5
          # 提示：如果仍然溢出，将 y_scale 从 5 改为 4 或 3

      # Step 3: 推送到 output 分支（如果不存在会自动创建）
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output    # 专门存放生成资源的分支
          build_dir: dist          # 将 dist 目录内容推送到 output 分支根目录
          keep_history: false      # 每次强制推送最新内容，不保留历史（节省空间）
          commit_message: "Update snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 使用 GitHub 自动提供的 Token
